<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagihan AF27</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  
  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#185FA5', // Warna accent aslimu
              hover: '#0C447C',
              light: '#E6F1FB',
            }
          }
        }
      }
    }
  </script>

  <script src="js/app.js" defer></script>
</head>
<body class="bg-gray-100 text-slate-800 font-sans min-h-screen">

  <nav class="sticky top-0 z-50 bg-white border-b border-gray-200 px-5 flex items-center justify-between h-14">
    <div class="flex items-center gap-2 text-brand font-semibold text-base">
      <i class="ti ti-receipt-2 text-xl"></i>
      <span class="hidden sm:inline">TagihanKu</span>
    </div>
    
    <div class="flex gap-2">
      <button class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-md text-sm font-medium border border-gray-300 hover:bg-gray-50 transition-colors" onclick="exportData()">
        <i class="ti ti-download"></i> Export
      </button>
      <button class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-md text-sm font-medium border border-gray-300 hover:bg-gray-50 transition-colors" onclick="openImport()">
        <i class="ti ti-upload"></i> Import
      </button>
      <button class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-md text-sm font-medium bg-brand text-white border border-transparent hover:bg-brand-hover transition-colors" onclick="openAddFriend()">
        <i class="ti ti-user-plus"></i> Teman baru
      </button>
    </div>
  </nav>

  <div class="flex flex-col md:flex-row max-w-6xl mx-auto mt-5 gap-4 px-4">
    
    <div class="w-full md:w-56 shrink-0 bg-white rounded-xl border border-gray-200 overflow-hidden h-fit md:sticky md:top-[70px]">
      </div>

    <div class="flex-1 min-w-0">
       </div>
  </div>

  </body>
</html>
